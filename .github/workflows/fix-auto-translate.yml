name: 🔧 修復 auto-translate 分支（一次性）

# 只能手動觸發，跑完就不需要了
on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo（完整歷史）
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 從所有歷史 commit 撈出最新的 zh-Hant 檔案
        run: |
          echo "📦 開始從 git 歷史撈出所有 zh-Hant 檔案..."

          # 建立暫存目錄
          mkdir -p /tmp/zh-hant-restore

          # 取得所有曾經包含 zh-Hant 的 commit（從最舊到最新）
          # 這樣後面的 commit 會覆蓋前面的，確保每個檔案都是最新版本
          git log --all --oneline --reverse -- zh-Hant/ | awk '{print $1}' | while read commit; do
            git ls-tree -r --name-only "$commit" -- zh-Hant/ | while IFS= read -r f; do
              dir="/tmp/zh-hant-restore/$(dirname "$f")"
              mkdir -p "$dir"
              git show "$commit:$f" > "/tmp/zh-hant-restore/$f" 2>/dev/null || true
            done
          done

          TOTAL=$(find /tmp/zh-hant-restore/zh-Hant -name "*.md" 2>/dev/null | wc -l)
          echo "✅ 撈出 ${TOTAL} 個 .md 檔案"

      - name: 重建 auto-translate 分支
        run: |
          echo "🔨 重建 auto-translate 分支..."

          # 建立全新的孤兒分支
          git checkout --orphan auto-translate-new
          git rm -rf . >/dev/null 2>&1 || true

          # 複製所有撈出的 zh-Hant 檔案
          cp -r /tmp/zh-hant-restore/zh-Hant ./zh-Hant

          # 同時把 en/ 從上游拉進來（翻譯程式需要）
          git remote add upstream https://github.com/nopSolutions/nopCommerce-Docs.git || true
          git fetch upstream master
          git checkout upstream/master -- en/ 2>/dev/null || true

          # 複製 .last-upstream-sync（從 auto-translate 取，若不存在則略過）
          git show origin/auto-translate:.last-upstream-sync > .last-upstream-sync 2>/dev/null || true

          TOTAL=$(find zh-Hant -name "*.md" | wc -l)
          echo "📊 zh-Hant/ 共 ${TOTAL} 個 .md 檔案"

      - name: Commit 所有檔案
        run: |
          # stage 所有檔案
          git add --no-all zh-Hant/ en/
          git add -f .last-upstream-sync 2>/dev/null || true

          STAGED=$(git diff --staged --name-only | wc -l)
          echo "📋 staged ${STAGED} 個檔案"

          git commit -m "🔧 修復：重建 auto-translate 分支，包含所有已翻好的 zh-Hant 檔案"

      - name: 推送並取代舊的 auto-translate
        run: |
          git push origin auto-translate-new:auto-translate --force
          echo "✅ auto-translate 分支已修復完成！"

          TOTAL=$(find zh-Hant -name "*.md" | wc -l)
          echo "📊 最終 zh-Hant/ 共 ${TOTAL} 個 .md 檔案"
