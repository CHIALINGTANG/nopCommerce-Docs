name: Build and Deploy DocFX to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install DocFX
        run: dotnet tool update -g docfx

      - name: Build DocFX site
        run: docfx docfx.json

      - name: Fix links for GitHub Pages project site
        run: |
          python3 <<'PY'
          from pathlib import Path

          site_dir = Path("_site")
          base = "/nopCommerce-Docs"

          replacements = {
              'href="/en/': f'href="{base}/en/',
              'href="/zh-Hant/': f'href="{base}/zh-Hant/',
              'href="/styles/': f'href="{base}/styles/',
              'href="/public/': f'href="{base}/public/',
              'href="/assets/': f'href="{base}/assets/',
              'href="/images/': f'href="{base}/images/',
              'href="/templates/': f'href="{base}/templates/',
              'href="/favicon.ico"': f'href="{base}/favicon.ico"',
              'href="/logo.png"': f'href="{base}/logo.png"',

              'src="/en/': f'src="{base}/en/',
              'src="/zh-Hant/': f'src="{base}/zh-Hant/',
              'src="/styles/': f'src="{base}/styles/',
              'src="/public/': f'src="{base}/public/',
              'src="/assets/': f'src="{base}/assets/',
              'src="/images/': f'src="{base}/images/',
              'src="/templates/': f'src="{base}/templates/',
              'src="/logo.png"': f'src="{base}/logo.png"',

              'content="/en/': f'content="{base}/en/',
              'content="/zh-Hant/': f'content="{base}/zh-Hant/',
          }

          for path in site_dir.rglob("*"):
              if path.suffix.lower() not in [".html", ".htm", ".js", ".css", ".json"]:
                  continue

              text = path.read_text(encoding="utf-8", errors="ignore")
              original = text

              for old, new in replacements.items():
                  text = text.replace(old, new)

              # 修正 CSS 裡面的 url(/xxx)
              text = text.replace("url(/styles/", f"url({base}/styles/")
              text = text.replace("url(/public/", f"url({base}/public/")
              text = text.replace("url(/assets/", f"url({base}/assets/")
              text = text.replace("url(/images/", f"url({base}/images/")
              text = text.replace("url(/logo.png", f"url({base}/logo.png")

              if text != original:
                  path.write_text(text, encoding="utf-8")

          print("GitHub Pages project path fixed.")
          PY

      - name: Add redirect from root to zh-Hant
        run: |
          cat > _site/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="zh-Hant">
          <head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0; url=/nopCommerce-Docs/zh-Hant/">
            <title>nopCommerce 文件</title>
          </head>
          <body>
            <p>Redirecting to <a href="/nopCommerce-Docs/zh-Hant/">nopCommerce 文件</a>...</p>
          </body>
          </html>
          EOF

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
